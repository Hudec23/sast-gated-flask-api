name: DAST

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dast-before:
    name: ZAP baseline (before)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Start Flask app
        run: |
          uv run flask --app webshop:create_app run --host 127.0.0.1 --port 5000 &
          ./scripts/wait-for-health.sh

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:5000/dast-sitemap"
          cmd_options: "-j"
          artifact_name: zap-before-report
          fail_action: true

  dast-after:
    name: ZAP baseline (after V11 fix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Start Flask app (DAST_REMEDIATED=1)
        env:
          DAST_REMEDIATED: "1"
        run: |
          uv run flask --app webshop:create_app run --host 127.0.0.1 --port 5000 &
          ./scripts/wait-for-health.sh

      - name: ZAP baseline scan (remediated demo)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:5000/dast-sitemap"
          cmd_options: "-j"
          artifact_name: zap-after-report
          fail_action: false

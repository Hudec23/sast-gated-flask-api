name: SCA

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Run pip-audit (fail on known CVEs)
        run: uv run pip-audit --desc

      - name: Generate pip-audit JSON report
        if: always()
        run: uv run pip-audit --format json -o pip-audit-report.json || true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit-report.json
